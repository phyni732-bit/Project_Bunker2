<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль игрока Unpenkrs - Бункер онлайн 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        
        .profile-cont {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .big-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: block;
            object-fit: cover;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Статус администратора */
        .status {
            font-size: 1rem;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stats-box {
            background-color: #121212;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .stats-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .stats-line:last-child {
            margin-bottom: 0;
        }
        .stats-label { color: #888888; }
        .stats-val { font-weight: bold; color: #ffffff; }

        /* Кнопка жалоб */
        .complaints {
            display: block;
            width: 100%;
            background-color: #d32f2f;
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .complaints:hover {
            background-color: #b71c1c;
        }
        .complaints:active {
            transform: scale(0.98);
        }

        .back {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back:hover {
            color: #ffffff;
        }

        @media (max-width: 450px) {
            .profile-cont {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <main class="profile-cont">
        <img src="media/big.jpg" alt="Аватар Unpenkrs" class="big-avatar">
        
        <h2>Unpenkrs</h2>
        <p class="status">Администратор</p>
        
        <div class="stats-box">
            <div class="stats-line">
                <span class="stats-label">Сыграно игр:</span>
                <span class="stats-val">3707</span>
            </div>
            <div class="stats-line">
                <span class="stats-label">Выиграно в бункере:</span>
                <span class="stats-val">2307</span>
            </div>
            <div class="stats-line">
                <span class="stats-label">Уровень допуска:</span>
                <span class="stats-val">БОГ</span>
            </div>
        </div>

        <a href="complaints-1.html" class="complaints">Жалобы (3)</a>

        <a href="index-log.html" class="back">← На главную</a>
    </main>

</body>
</html>
