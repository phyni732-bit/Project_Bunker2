<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бункер онлайн 2 - виртуальная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative; 
        }

        .cont {
            padding: 20px;
        }

        /* РЕКЛАМНЫЙ БАННЕР*/
        .banner-left {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%); 
            width: 250px;
            height: 500px;
            background-color: #ffffff;
            overflow: hidden;
            display: block;
            transition:transform 0.2s ease;
        }

        .banner-left:hover {
            transform: translateY(-50%) scale(1.01);
        }

        .banner-left img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Чтобы картинка заполняла весь блок, не искажаясь */
            display: block;
        }

        /* Кнопка войти */
        .login {
            position: absolute;
            top: 25px;
            right: 30px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 20px;
            border: 1px solid #888888;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .login:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* --- СТИЛИ ПЛАШКИ --- */
        .modal {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 100;
        }
        
        .modal:target {
            opacity: 1;
            visibility: visible;
        }

        .modal-cont {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            position: relative;
            z-index: 101;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal:target .modal-cont {
            transform: translateY(0);
        }

        .modal-cont h3 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .close {
            position: absolute;
            top: 15px; 
            right: 20px;
            color: #888888;
            text-decoration: none;
            font-size: 1.5rem;
            transition: color 0.2s ease;
        }

        .close:hover { 
            color: #ffffff; 
        }
        
        .modal-li {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #ffffff;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s ease;
        }

        .modal-lo {
            background-color: #333333;
        }

        .modal-lo:hover { 
            background-color: #444444;
        }

        .modal-reg {
            background-color: #d32f2f;
        }

        .modal-reg:hover { 
            background-color: #b71c1c; 
        }
  
        h1 { 
            font-size: 3.5rem; 
            font-weight: 700; 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

        p { 
            font-size: 1.2rem; 
            color: #888888; 
            margin-bottom: 50px; 
            letter-spacing: 1px; 
        }
        
        .play {
            display: inline-block; 
            text-decoration: none; 
            background-color: #d32f2f; 
            color: #ffffff; 
            border: none; 
            padding: 18px 50px; 
            font-size: 1.2rem;
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .play:hover { 
            background-color: #b71c1c; 
        }

        .play:active { 
            transform: scale(0.96); 
        }

        footer { 
            position: absolute; 
            bottom: 30px; 
            display: flex; 
            gap: 40px; 
        }

        footer a { 
            color: #888888;
            text-decoration: none; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: color 0.2s ease; 
        }

        footer a:hover {
             color: #ffffff; 
        }

        /* Адаптация для мобильных устройств */
        @media (max-width: 900px) {
            .banner-left {
                display: none; /* Скрываем рекламу на узких экранах, чтобы не перекрывала центр */
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .play { padding: 15px 40px; font-size: 1rem; }
            footer { gap: 20px; bottom: 20px; }
            footer a { font-size: 0.8rem; }
            .login { top: 15px; right: 15px; font-size: 0.8rem; padding: 6px 15px; }
        }
    </style>
</head>
<body>

    <a href="reklama.html" class="banner-left"><img src="media/reklama3.jpg" alt="реклама"> </a>

    <a href="#auth-modal" class="login">Войти</a>

    <main class="cont">
        <h1>Бункер онлайн 2</h1>
        <p>виртуальная версия</p>
        <a href="#auth-modal" class="play">Найти игру</a>
    </main>

    <footer>
        <a href="index.html">Главная</a>
        <a href="rules.html">Правила</a>
        <a href="about.html">О нас</a>
    </footer>

    <div id="auth-modal" class="modal">
        <a href="#"></a> 
        <div class="modal-cont">
            <a href="#" class="close">&times;</a>
            <h3>Вход в бункер</h3>
            <a href="login.html" class="modal-li modal-lo">Войти</a>
            <a href="register.html" class="modal-li modal-reg">Зарегистрироваться</a>
        </div>
    </div>

</body>
</html>
