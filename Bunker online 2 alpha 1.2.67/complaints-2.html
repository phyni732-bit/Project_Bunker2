<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель жалоб - Бункер онлайн 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        
        .panel-cont {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d32f2f;
        }

        p.subtitle {
            color: #888888;
            margin-bottom: 30px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .complaints-list {
            list-style: none;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .complaints-list li {
            margin-bottom: 10px;
        }
        
        .complaint-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #121212;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 15px;
            border-radius: 6px;
            text-decoration: none;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .complaint-link:hover {
            border-color: #d32f2f;
            transform: translateX(5px);
        }

        .c-author {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .c-date {
            font-size: 0.8rem;
            color: #888888;
        }

        .back {
            display: inline-block;
            color: #888888;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .back:hover {
            color: #ffffff;
        }

        @media (max-width: 450px) {
            .panel-cont {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <main class="panel-cont">
        <h2>Жалобы</h2>
        <p class="subtitle">Требуют рассмотрения администратора</p>
        
        <ul class="complaints-list">
            <li>
                <a href="detail-2.html" class="complaint-link">
                    <span class="c-author">Ne_Nishchiy</span>
                    <span class="c-date">Вчера, 21:05</span>
                </a>
            </li>
            <li>
                <a href="#" class="complaint-link">
                    <span class="c-author">Sanek</span>
                    <span class="c-date">Вчера, 18:40</span>
                </a>
            </li>
        </ul>

        <a href="profile_Unp.html" class="back">← Назад в профиль</a>
    </main>

</body>
</html>
