<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Бункер онлайн 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        
        .auth-cont {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #121212;
            border: 1px solid #333333;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }
        
        /* Стилизация при ошибке ввода (по желанию) */
        input:not(:placeholder-shown):invalid {
            border-color: #d32f2f;
        }
        input:not(:placeholder-shown):valid {
            border-color: #4caf50;
        }

        .submit {
            width: 100%;
            background-color: #d32f2f;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-bottom: 20px;
        }
        .submit:hover { background-color: #b71c1c; }
        .submit:active { transform: scale(0.98); }

        .back {
            color: #888888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }
        .back:hover {
            color: #ffffff;
        }

        @media (max-width: 450px) {
            .auth-cont {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <main class="auth-cont">
        <h2>Вход</h2>
        <form action="index-log.html" method="GET">
            <input 
                type="text" 
                placeholder="Логин" 
                pattern="Unpenkrs" 
                title="Неверный логин" 
                required>
                
            <input 
                type="password" 
                placeholder="Пароль" 
                pattern="12345pap0" 
                title="Неверный пароль" 
                required>
                
            <button type="submit" class="submit">Войти</button>
        </form>
        <a href="index.html" class="back">← На главную</a>
    </main>

</body>
</html>
