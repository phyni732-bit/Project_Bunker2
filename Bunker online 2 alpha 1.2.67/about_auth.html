<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О нас - Бункер онлайн 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        
        .about-cont {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #888888;
            margin-bottom: 30px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .creators-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .creators-list li {
            background-color: #121212;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        /* Небольшой эффект при наведении на ники */
        .creators-list li:hover {
            border-color: #d32f2f;
            transform: translateX(5px);
        }

        .back {
            color: #888888;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }
        .back:hover {
            color: #ffffff;
        }

        @media (max-width: 450px) {
            .about-cont {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <main class="about-cont">
        <h2>Создатели</h2>
        <p class="subtitle">Команда разработки</p>
        
        <ul class="creators-list">
            <li>unpenkrs</li>
            <li>Umbra</li>
            <li>Ne_Nishchiy</li>
        </ul>

        <a href="index-auth.html" class="back">← На главную</a>
    </main>

</body>
</html>
